function estimateCategoryPrice(categoryKey, selections) {
  if (categoryKey === "montage") {
    const need = (selections.besoin && selections.besoin[0]) || "";
    if (need.includes("Windows") || need.includes("Installation Complète")) return prices.montageWindowsDrivers;
    return prices.montagePc;
  }
  if (categoryKey === "reparation") {

    if (problem === "PC Lent") return prices.optimisationPc;
    if (problem === "Problème Windows" || problem === "Virus / Pubs" || problem === "Écran Bleu") return prices.reinstallWindows;

  return categories[categoryKey].basePrice;
}

function scrollToId(id) {
  const target = document.getElementById(id);
  if (!target) return;
  if (window.__lenis) window.__lenis.scrollTo(target, { offset: -72 });
  else target.scrollIntoView({ behavior: "smooth", block: "start" });
}

function useLenis() {
  useEffect(() => {
    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    if (!window.Lenis) return;
    const lenis = new window.Lenis({ lerp: 0.11, smoothWheel: true, wheelMultiplier: 1 });
    window.__lenis = lenis;
    if (window.ScrollTrigger) lenis.on("scroll", window.ScrollTrigger.update);
    let raf;
    function loop(time) { lenis.raf(time); raf = requestAnimationFrame(loop); }
    raf = requestAnimationFrame(loop);
    return () => { cancelAnimationFrame(raf); lenis.destroy(); window.__lenis = null; };
  }, []);
}

function useCart() {
  const [cart, setCart] = useState(() => {
    try { return JSON.parse(localStorage.getItem("orellanatech-cart") || "[]"); } catch { return []; }
  });

  useEffect(() => { localStorage.setItem("orellanatech-cart", JSON.stringify(cart)); }, [cart]);

  const addItem = (item) => setCart((c) => [...c, { id: Date.now(), ...item }]);
  const removeItem = (id) => setCart((c) => c.filter((i) => i.id !== id));
  const clearCart = () => setCart([]);

  const totals = cart.reduce((t, i) => {
    if (i.billing === "monthly") t.monthly += i.price; else t.oneTime += i.price;
    return t;
  }, { oneTime: 0, monthly: 0 });

  const totalsLabel = totals.monthly && totals.oneTime
    ? `${formatPrice(totals.oneTime)} + ${formatPrice(totals.monthly)} / mois`
    : totals.monthly ? `${formatPrice(totals.monthly)} / mois` : formatPrice(totals.oneTime);

  const summary = cart.length === 0 ? "" : cart.map((item, i) =>
    `Prestation ${i + 1}: ${item.category}\nOptions: ${item.details}\nBudget indiqué: ${item.budget}\nPrix estimé: ${item.priceLabel || formatPrice(item.price)}`
  ).join("\n\n") + `\n\nTotal estimé: ${totalsLabel}`;

  return { cart, addItem, removeItem, clearCart, totalsLabel, summary };
}

function ParallaxGlow({ className }) {
  const ref = useRef(null);
  const { scrollYProgress } = useScroll({ target: ref, offset: ["start end", "end start"] });
  const y = useTransform(scrollYProgress, [0, 1], [-60, 60]);
  return <motion.div ref={ref} aria-hidden="true" style={{ y }} className={`pointer-events-none absolute rounded-full blur-3xl ${className}`} />;
}

function TiltCard({ children, className = "" }) {
  const reduce = useReducedMotion();
  const ref = useRef(null);
  const rx = useMotionValue(0);
  const ry = useMotionValue(0);
  const [canTilt] = useState(() => typeof window !== "undefined" && window.matchMedia("(hover: hover) and (pointer: fine)").matches);

  if (reduce) return <div className={className}>{children}</div>;

  function handleMove(e) {
    if (!canTilt || !ref.current) return;
    const rect = ref.current.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width - 0.5;
    const py = (e.clientY - rect.top) / rect.height - 0.5;
    ry.set(px * 10);
    rx.set(py * -10);
  }
  function handleLeave() { rx.set(0); ry.set(0); }

  return (
    <motion.div
      ref={ref}
      onMouseMove={handleMove}
      onMouseLeave={handleLeave}
      style={{ rotateX: rx, rotateY: ry, transformPerspective: 900 }}
      whileHover={{ scale: 1.02, y: -6 }}
      whileTap={{ scale: 0.98 }}
      transition={{ type: "spring", stiffness: 260, damping: 20 }}
      className={className}
    >
      {children}
    </motion.div>
  );
}

function CopyButton({ value, label }) {
  const [copied, setCopied] = useState(false);
  async function handleClick() {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(value);
      } else {
        const ta = document.createElement("textarea");
        ta.value = value; ta.style.position = "fixed"; ta.style.left = "-9999px";
        document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      }
      setCopied(true);
      setTimeout(() => setCopied(false), 1400);
    } catch (e) { /* clipboard unavailable, ignore */ }
  }
  return (
    <button type="button" onClick={handleClick}
      className={`relative rounded-lg border px-4 py-3 text-left transition-colors ${copied ? "border-brand-cyan bg-brand-cyan/5" : "border-black/10 bg-surface hover:border-brand-cyan/50"}`}>
      <span className="block text-xs font-bold uppercase tracking-wide text-ink/60">{label}</span>
      <strong className="block text-ink">{value}</strong>
      {copied && <span className="absolute right-4 top-4 text-xs font-bold uppercase text-brand-cyan">Copié</span>}
    </button>
  );
}

/* ============================== Hero ============================== */

function useHeroFallback() {
  // Touch devices and prefers-reduced-motion get a plain autoplaying video instead of
  // the scrubbed/pinned sequence — scroll-jacking on touch is unreliable and heavy.
  const [fallback, setFallback] = useState(true);
  useEffect(() => {
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const touch = window.matchMedia("(hover: none)").matches || window.matchMedia("(max-width: 767px)").matches;
    setFallback(reduce || touch);
  }, []);
  return fallback;
}

const FRAME_COUNT = 121;
const FRAME_SRC = (i) => `assets/frames/frame-${String(i + 1).padStart(4, "0")}.jpg`;

// Draws one frame into the canvas with "object-fit: cover" framing (canvas has no
// native object-fit, so the crop math is done by hand here).
function drawCoverFrame(canvas, img) {
  if (!canvas || !img || !img.complete || !img.naturalWidth) return;
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.clientWidth, ch = canvas.clientHeight;
  const pw = Math.round(cw * dpr), ph = Math.round(ch * dpr);
  if (canvas.width !== pw || canvas.height !== ph) { canvas.width = pw; canvas.height = ph; }

  const canvasRatio = canvas.width / canvas.height;
  const imgRatio = img.naturalWidth / img.naturalHeight;
  let sx, sy, sw, sh;
  if (imgRatio > canvasRatio) {
    sh = img.naturalHeight; sw = sh * canvasRatio; sx = (img.naturalWidth - sw) / 2; sy = 0;
  } else {
    sw = img.naturalWidth; sh = sw / canvasRatio; sx = 0; sy = (img.naturalHeight - sh) / 2;
  }
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
}

function HeroScrollLegacy({ onVideoReady }) {
  const wrapRef = useRef(null);
  const canvasRef = useRef(null);
  const videoRef = useRef(null); // fallback path only
  const hotspotRefs = useRef([]);
  const imagesRef = useRef([]);
  const frameRef = useRef(0);
  const [ready, setReady] = useState(false);
  const fallback = useHeroFallback();

  // Preload the whole frame sequence (this IS the "précharger avant scroll" step —
  // there's no video to wait on anymore, just every frame image).
  useEffect(() => {
    if (fallback) return;
    let cancelled = false;
    let loaded = 0;
    const imgs = new Array(FRAME_COUNT);
    for (let i = 0; i < FRAME_COUNT; i++) {
      const img = new Image();
      img.onload = img.onerror = () => {
        loaded++;
        if (loaded === FRAME_COUNT && !cancelled) {
          imagesRef.current = imgs;
          setReady(true);
          onVideoReady();
        }
      };
      img.src = FRAME_SRC(i);
      imgs[i] = img;
    }
    return () => { cancelled = true; };
  }, [fallback]);

  useEffect(() => {
    if (fallback) return;
    const v = videoRef.current;
    if (!v) return;
    function handleReady() { setReady(true); onVideoReady(); }
    v.addEventListener("loadeddata", handleReady, { once: true });
    v.addEventListener("error", handleReady, { once: true });
    return () => {
      v.removeEventListener("loadeddata", handleReady);
      v.removeEventListener("error", handleReady);
    };
  }, [fallback]);

  useEffect(() => {
    if (fallback || !ready) return;
    drawCoverFrame(canvasRef.current, imagesRef.current[frameRef.current]);
    function onResize() { drawCoverFrame(canvasRef.current, imagesRef.current[frameRef.current]); }
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, [fallback, ready]);

  // GSAP ScrollTrigger: only wired up once every frame is preloaded, and never on the
  // fallback path (mobile / reduced motion) to avoid scroll-jacking there. Frames are
  // drawn straight to canvas — no video seek/decode in the hot path — so this tracks
  // the scroll position essentially instantly, the same technique Apple uses for its
  // product-teardown sequences (a preloaded image sequence, not a scrubbed video).
  useEffect(() => {
    if (fallback || !ready) return;
    if (!window.gsap || !window.ScrollTrigger) return;
    const wrap = wrapRef.current;
    const canvas = canvasRef.current;
    if (!wrap || !canvas) return;

    const gsap = window.gsap;
    const ScrollTrigger = window.ScrollTrigger;
    gsap.registerPlugin(ScrollTrigger);

    const SEQUENCE_END = 0.75; // last frame is reached at 75% of the section's scroll
    const ctx = gsap.context(() => {
      ScrollTrigger.create({
        trigger: wrap,
        start: "top top",
        end: "bottom top",
        onUpdate: (self) => {
          const t = Math.min(self.progress / SEQUENCE_END, 1);
          const idx = Math.round(t * (FRAME_COUNT - 1));
          if (idx !== frameRef.current) {
            frameRef.current = idx;
            drawCoverFrame(canvas, imagesRef.current[idx]);
          }
        },
      });

      // One timeline per hotspot, each owning a single non-overlapping ScrollTrigger
      // range for its whole lifecycle (fade in -> hold -> fade out). Two independent
      // tweens per element would fight over `opacity` outside their own active window
      // (whichever is "before its start" keeps clamping the property to its own resting
      // value), so everything for one hotspot must live on one timeline/trigger.
      const step = SEQUENCE_END / HOTSPOTS.length;
      const fade = step * 0.22;
      hotspotRefs.current.forEach((el, i) => {
        if (!el) return;
        const start = i * step;
        const end = start + step;
        const tl = gsap.timeline({
          scrollTrigger: { trigger: wrap, start: `${start * 100}% top`, end: `${end * 100}% top`, scrub: 0.3 },
        });
        tl.fromTo(el, { opacity: 0, y: 24 }, { opacity: 1, y: 0, ease: "none", duration: fade })
          .to(el, { opacity: 1, y: 0, ease: "none", duration: step - fade * 2 })
          .to(el, { opacity: 0, y: -16, ease: "none", duration: fade });
      });

      gsap.fromTo(canvas,
        { filter: "blur(0px)", opacity: 1 },
        {
          filter: "blur(22px)", opacity: 0.25, ease: "none",
          scrollTrigger: { trigger: wrap, start: `${SEQUENCE_END * 100}% top`, end: "bottom top", scrub: 0.3 },
        }
      );
    }, wrap);

    return () => ctx.revert();
  }, [fallback, ready]);

  if (fallback) {
    return (
      <div id="accueil" className="relative bg-black">
        <div className="relative flex h-[70vh] items-center justify-center overflow-hidden sm:h-screen">
          <video
            ref={videoRef}
            className="h-full w-full object-cover"
            src="assets/studio-scroll.mp4"
            autoPlay muted loop playsInline preload="auto"
            onLoadedData={onVideoReady}
            onError={onVideoReady}
          />
          <div aria-hidden="true" className="absolute inset-0 bg-gradient-to-b from-black/40 via-black/10 to-black/70" />
          <div className="pointer-events-none absolute inset-0 flex flex-col items-center justify-center px-6 text-center">
            <h1 className="bg-gradient-to-r from-white via-brand-amber to-brand-cyan bg-clip-text text-[clamp(1.7rem,9vw,4.5rem)] font-extrabold tracking-[0.05em] text-transparent">
              ORELLANATECH
            </h1>
            <p className="mt-4 max-w-[88vw] text-[0.65rem] uppercase tracking-[0.15em] text-white/75 sm:text-sm">
              Services informatiques &amp; architecture digitale — Grenoble
            </p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div id="accueil" ref={wrapRef} className="relative h-[200vh] bg-black">
      <div className="sticky top-0 h-screen overflow-hidden">
        <canvas ref={canvasRef} className="h-full w-full" />
        {HOTSPOTS.map((h, i) => (
          <div
            key={h.title}
            ref={(el) => (hotspotRefs.current[i] = el)}
            style={{ opacity: 0 }}
            className={`absolute top-1/2 max-w-xs -translate-y-1/2 rounded-2xl border border-black/5 bg-white/90 p-4 shadow-lg backdrop-blur-md sm:max-w-sm ${h.pos === "left" ? "left-6 sm:left-12" : "right-6 sm:right-12"}`}

            <p className="text-sm leading-snug text-ink/70">{h.text}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function ConfiguratorSection({ cartApi }) {
  const [categoryKey, setCategoryKey] = useState("");
  const [answers, setAnswers] = useState({});
  const [cardState, setCardState] = useState({ format: "Standard 85 x 55 mm", finish: "Aucun(e)", orientation: "Horizontale", quantity: "250", design: "Création Complète" });
  const [message, setMessage] = useState(null);

  const category = categories[categoryKey];

  function selectCategory(key) {
    setCategoryKey(key);
    setAnswers({});
    setMessage(null);
  }

  function toggleAnswer(qid, type, value) {
    setAnswers((prev) => {
      const current = prev[qid] || [];
      if (type === "radio") return { ...prev, [qid]: [value] };
      const has = current.includes(value);
      return { ...prev, [qid]: has ? current.filter((v) => v !== value) : [...current, value] };
    });
  }

  function addToCart() {
    if (!category) { setMessage({ type: "error", text: "Choisis une catégorie avant d'ajouter une prestation." }); return; }

    if (categoryKey === "cartesVisite") {
      const optionKey = `${cardState.format} - ${cardState.finish} - ${cardState.quantity} cartes`;
      const price = businessCardPrices[optionKey] || category.basePrice;
      cartApi.addItem({
        category: category.label,
        details: `Format / Quantité : ${optionKey} | Orientation : ${cardState.orientation} | Design : ${cardState.design}`,
        budget: "Prix affiché OK", price, priceLabel: "", billing: "one-time",
      });
      setMessage({ type: "success", text: "Prestation ajoutée à la demande." });
      return;
    }

    const missing = category.questions.filter((q) => !(answers[q.id] && answers[q.id].length)).map((q) => q.title);
    if (missing.length) { setMessage({ type: "error", text: `Complète les champs suivants : ${missing.join(", ")}.` }); return; }

    const price = estimateCategoryPrice(categoryKey, answers);
    const budget = (answers.budget && answers.budget[0]) || "Non précisé";
    const details = Object.entries(answers).map(([k, v]) => `${labelFromKey(k)} : ${v.join(", ")}`).join(" | ");

    cartApi.addItem({
      category: category.label, details, budget, price,
      priceLabel: category.billing === "monthly" ? `${formatPrice(price)} / mois` : "",
      billing: category.billing || "one-time",
    });
    setMessage({ type: "success", text: "Prestation ajoutée à la demande." });
  }

  return (
    <section id="configurateur" className="bg-bg py-20 sm:py-28">
      <div className="mx-auto max-w-6xl px-4">
        <Reveal className="mb-10 max-w-xl">
          <h2 className="text-3xl font-extrabold tracking-tight sm:text-4xl">Composez votre demande en quelques clics</h2>
          <p className="mt-3 text-ink/60">Ajoutez une ou plusieurs prestations, puis envoyez un récapitulatif clair avec vos coordonnées.</p>
        </Reveal>
        <Reveal delay={0.05} className="grid gap-6 lg:grid-cols-[1fr_380px]">
          <div className="rounded-xl border border-black/10 bg-surface p-6">
            <label className="block font-bold text-ink" htmlFor="category-select">Catégorie de besoin</label>
            <select id="category-select" value={categoryKey} onChange={(e) => selectCategory(e.target.value)}
              className="mt-2 w-full rounded-lg border border-black/10 bg-surface px-3 py-3 text-ink">
              <option value="">Choisir une catégorie</option>
              {Object.entries(categories).map(([key, c]) => <option key={key} value={key}>{c.label}</option>)}
            </select>

            {category && categoryKey !== "cartesVisite" && (
              <div className="my-6 grid gap-6">
                {category.note && <p className="rounded-lg border-l-2 border-brand-amber bg-brand-amber/10 p-3 font-semibold text-ink">{category.note}</p>}
                {category.questions.map((q) => (
                  <fieldset key={q.id} className="border-0 p-0">
                    <legend className="mb-2 font-bold text-ink">{q.title}</legend>
                    <div className="grid grid-cols-1 gap-2 sm:grid-cols-2">
                      {q.options.map((opt) => {
                        const checked = (answers[q.id] || []).includes(opt);
                        return (
                          <label key={opt} className={`flex cursor-pointer items-center gap-2 rounded-lg border px-3 py-2 text-sm font-medium ${checked ? "border-brand-cyan bg-brand-cyan/5" : "border-black/10"}`}>
                            <input type={q.type} name={q.id} checked={checked} onChange={() => toggleAnswer(q.id, q.type, opt)} className="h-4 w-4 accent-brand-cyan" />
                            {opt}
                          </label>
                        );
                      })}
                    </div>
                  </fieldset>
                ))}
              </div>
            )}

            {categoryKey === "cartesVisite" && (
              <div className="my-6"><BusinessCardPicker state={cardState} setState={setCardState} /></div>
            )}

            <button type="button" onClick={addToCart}
              className="w-full rounded-full bg-brand-amber py-3 font-extrabold text-white shadow-lg shadow-brand-amber/25 transition-transform hover:-translate-y-0.5">
              Ajouter à ma demande
            </button>
            {message && <p className={`mt-3 font-bold ${message.type === "error" ? "text-red-600" : "text-brand-cyan"}`}>{message.text}</p>}
          </div>

          <aside className="h-fit rounded-xl border border-black/10 bg-surface p-6">
            <div className="mb-4 flex items-start justify-between gap-4">
              <div>
                <p className="text-xs font-bold uppercase tracking-wide text-brand-cyan">Récapitulatif</p>
                <h3 className="font-bold text-ink">Ma demande</h3>
              </div>
              <button type="button" onClick={cartApi.clearCart} className="font-bold text-brand-cyan">Vider</button>
            </div>
            <div className="grid gap-3">
              {cartApi.cart.length === 0 && <p className="text-ink/60">Aucun service ajouté pour le moment.</p>}
              {cartApi.cart.map((item) => (
                <article key={item.id} className="rounded-lg bg-surface p-4">
                  <div className="flex items-start justify-between gap-3">
                    <h4 className="font-bold text-ink">{item.category}</h4>
                    <button type="button" onClick={() => cartApi.removeItem(item.id)} aria-label={`Supprimer ${item.category}`} className="h-8 w-8 shrink-0 rounded-lg border border-black/10 font-bold text-red-600">X</button>
                  </div>
                  <p className="mt-2 text-sm text-ink/60">{item.details}</p>
                  <p className="mt-2 text-sm text-ink/60">Budget indiqué : {item.budget}</p>
                  <span className="mt-2 inline-block font-bold text-brand-cyan">Prestation estimée : {item.priceLabel || formatPrice(item.price)}</span>
                </article>
              ))}
            </div>
            <div className="mt-5 flex items-baseline justify-between border-t border-black/10 pt-4 text-lg font-extrabold">
              <span>Total estimé</span><strong>{cartApi.totalsLabel}</strong>
            </div>
            <p className="mt-3 text-sm text-ink/60">Prix estimatif. Le devis final est confirmé après échange selon le matériel, la distance et la difficulté.</p>
          </aside>
        </Reveal>

  );
}

function FooterCopy({ value }) {
  const [copied, setCopied] = useState(false);
  async function handleClick() {
    try {
      if (navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(value);
      setCopied(true);
      setTimeout(() => setCopied(false), 1400);
    } catch (e) { /* clipboard unavailable, ignore */ }
  }
  return <button type="button" onClick={handleClick} className="font-bold text-brand-cyan hover:underline">{copied ? "Copié" : value}</button>;
}

<script src="https://unpkg.com/lenis@1.3.11/dist/lenis.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
  (() => {
    const intro = document.getElementById("ot-intro");
    const stage = document.getElementById("ot-stage");
    const card = document.getElementById("ot-card");
    const image = document.getElementById("ot-card-image");
    const title = document.getElementById("ot-title");
    const scrollHint = document.getElementById("ot-scroll");
    if (!intro || !stage || !card || !image || !title) return;
    let mx = 0, my = 0;
    intro.addEventListener("pointermove", (event) => {
      mx = event.clientX / innerWidth - .5;
      my = event.clientY / innerHeight - .5;
    });
    const update = () => {
      const max = intro.offsetHeight - innerHeight;
      const progress = Math.max(0, Math.min(1, -intro.getBoundingClientRect().top / max));
      const eased = 1 - Math.pow(1 - progress, 3);
      const scale = Math.max(.045, 1 - eased * .955);
      const opacity = Math.max(0, 1 - Math.max(0, progress - .72) / .22);
      stage.style.transform = `scale(${scale}) rotate(${progress * -2.2}deg)`;
      stage.style.opacity = `${opacity}`;
      title.style.transform = `scale(${1 + progress * .35}) translateY(${-progress * 24}vh)`;
      title.style.opacity = `${Math.max(0, 1 - progress * 1.35)}`;
      image.style.transform = `scale(${1.04 + progress * .08}) translate(${mx * -10}px,${my * -8}px)`;
      if (scrollHint) scrollHint.style.opacity = `${Math.max(0, 1 - progress * 5)}`;
      requestAnimationFrame(update);
    };
    update();
  })();
</script>
