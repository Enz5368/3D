function FooterCopy({ value }) {

      setCopied(true);
      setTimeout(() => setCopied(false), 1400);

  }
  return <button type="button" onClick={handleClick} className="font-bold text-brand-cyan hover:underline">{copied ? "CopiÃ©" : value}</button>;
}

<script src="https://unpkg.com/lenis@1.3.11/dist/lenis.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
  (() => {
    const intro = document.getElementById("ot-intro");
    const stage = document.getElementById("ot-stage");
    const card = document.getElementById("ot-card");
    const image = document.getElementById("ot-card-image");
    const fluidCanvas = document.getElementById("ot-fluid-reveal");
    const title = document.getElementById("ot-title");
    const scrollHint = document.getElementById("ot-scroll");
    const sticky = intro?.querySelector(".ot-sticky");
    const introHead = intro?.querySelector(".ot-head");
    const ribbons = document.getElementById("ot-ribbons");
    if (!intro || !stage || !card || !image || !title || !ribbons || !fluidCanvas || !sticky) return;
    const fluidCtx = fluidCanvas.getContext("2d");
    const drawCoverImage = (context, source, width, height) => {
      const sourceRatio = source.naturalWidth / source.naturalHeight;
      const boxRatio = width / height;
      let drawWidth, drawHeight, x, y;
      if (sourceRatio > boxRatio) {
        drawHeight = height;
        drawWidth = height * sourceRatio;
        x = (width - drawWidth) * .5;
        y = 0;
      } else {
        drawWidth = width;
        drawHeight = width / sourceRatio;
        x = 0;
        y = (height - drawHeight) * .5;
      }
      context.drawImage(source, x, y, drawWidth, drawHeight);
    };
    let revealReady = false;
    let revealProgress = 0;
    const runFluidReveal = () => {
      if (!fluidCtx) {
        image.classList.add("ot-reveal-complete");
        return;
      }
      const ratio = Math.min(devicePixelRatio || 1, 2);
      const width = innerWidth, height = innerHeight;
      fluidCanvas.width = Math.round(width * ratio);
      fluidCanvas.height = Math.round(height * ratio);
      fluidCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
      const started = performance.now();
      const duration = 1900;
      const renderReveal = (now) => {
        const raw = Math.min(1, (now - started) / duration);
        const progress = 1 - Math.pow(1 - raw, 3);
        revealProgress = progress;
        title.style.opacity = "1";
        title.style.clipPath = `circle(${progress * 78}vmax at 50% 58%)`;
        const diagonal = Math.hypot(width, height);
        fluidCtx.clearRect(0, 0, width, height);
        fluidCtx.save();
        fluidCtx.beginPath();
        const points = 110;
        const baseRadius = progress * diagonal * .72;
        for (let index = 0; index <= points; index++) {
          const angle = index / points * Math.PI * 2;
          const wave = Math.sin(angle * 3 + progress * 5) * .09 + Math.cos(angle * 5 - progress * 3) * .055 + Math.sin(angle * 2) * .035;
          const radius = Math.max(0, baseRadius * (1 + wave));
          const x = width * .5 + Math.cos(angle) * radius;
          const y = height * .58 + Math.sin(angle) * radius;
          if (index === 0) fluidCtx.moveTo(x, y);
          else fluidCtx.lineTo(x, y);
        }
        fluidCtx.closePath();
        fluidCtx.clip();
        drawCoverImage(fluidCtx, image, width, height);
        fluidCtx.restore();
        if (raw < 1) requestAnimationFrame(renderReveal);
        else {
          image.classList.add("ot-reveal-complete");
          fluidCanvas.classList.add("is-complete");
          revealReady = true;
          intro.classList.add("is-revealed");
          title.style.clipPath = "none";
        }
      };
      requestAnimationFrame(renderReveal);
    };
    if (image.complete && image.naturalWidth) runFluidReveal();
    else image.addEventListener("load", runFluidReveal, { once: true });
    const ctx = ribbons.getContext("2d");
    const target = { x: innerWidth * .5, y: innerHeight * .5 };
    class RibbonLine {
      constructor(index, count) {
        this.spring = .4 + (index / count) * .025 + Math.random() * .04;
        this.friction = .49 + Math.random() * .012;
        this.nodes = Array.from({ length: 28 }, () => ({ x: target.x, y: target.y, vx: 0, vy: 0 }));
      }
      update() {
        let spring = this.spring;
        for (let i = 0; i < this.nodes.length; i++) {
          const node = this.nodes[i];
          const lead = i === 0 ? target : this.nodes[i - 1];
          node.vx += (lead.x - node.x) * spring;
          node.vy += (lead.y - node.y) * spring;
          if (i > 0) {
            node.vx += lead.vx * .1;
            node.vy += lead.vy * .1;
          }
          node.vx *= this.friction;
          node.vy *= this.friction;
          node.x += node.vx;
          node.y += node.vy;
          spring *= .95;
        }
      }
      draw(context, color) {
        context.beginPath();
        context.moveTo(this.nodes[0].x, this.nodes[0].y);
        for (let i = 1; i < this.nodes.length - 2; i++) {
          const a = this.nodes[i], b = this.nodes[i + 1];
          context.quadraticCurveTo(a.x, a.y, (a.x + b.x) * .5, (a.y + b.y) * .5);
        }
        context.strokeStyle = color;
        context.stroke();
      }
    }
    const ribbonLines = Array.from({ length: 38 }, (_, index) => new RibbonLine(index, 38));
    const ribbonColors = ["rgba(0,113,227,.22)", "rgba(41,151,255,.2)", "rgba(100,210,255,.16)", "rgba(255,255,255,.1)"];
    const resizeRibbons = () => {
      const ratio = Math.min(devicePixelRatio || 1, 2);
      ribbons.width = Math.round(innerWidth * ratio);
      ribbons.height = Math.round(innerHeight * ratio);
      ribbons.style.width = `${innerWidth}px`;
      ribbons.style.height = `${innerHeight}px`;
      ctx?.setTransform(ratio, 0, 0, ratio, 0, 0);
    };
    resizeRibbons();
    addEventListener("resize", resizeRibbons);
    let mx = 0, my = 0;
    intro.addEventListener("pointermove", (event) => {
      mx = event.clientX / innerWidth - .5;
      my = event.clientY / innerHeight - .5;
      target.x = event.clientX;
      target.y = event.clientY;
    });
    const update = () => {
      const max = intro.offsetHeight - innerHeight;
      const progress = Math.max(0, Math.min(1, -intro.getBoundingClientRect().top / max));
      const eased = 1 - Math.pow(1 - progress, 3);
      const scale = Math.max(.045, 1 - eased * .955);
      const opacity = Math.max(0, 1 - Math.max(0, progress - .72) / .22);
      stage.style.transform = `scale(${scale}) rotate(${progress * -2.2}deg)`;
      stage.style.opacity = `${opacity}`;
      title.style.transform = `scale(${1 + progress * .35}) translateY(${-progress * 24}vh)`;
      title.style.opacity = revealProgress > 0 ? `${Math.max(0, 1 - progress * 1.35)}` : "0";
      image.style.transform = `scale(${1.04 + progress * .08}) translate(${mx * -10}px,${my * -8}px)`;
      ribbons.style.opacity = `${Math.max(0, 1 - progress * 2.4)}`;
      const backdropOpacity = Math.max(0, 1 - Math.max(0, progress - .55) / .38);
      sticky.style.backgroundColor = `rgba(244,247,251,${backdropOpacity})`;
      sticky.style.pointerEvents = progress > .9 ? "none" : "auto";
      if (introHead) introHead.style.opacity = revealReady ? `${Math.max(0, 1 - progress * 3.2)}` : "0";
      if (ctx && progress < .55) {
        ctx.clearRect(0, 0, innerWidth, innerHeight);
        ctx.globalCompositeOperation = "lighter";
        ctx.lineWidth = 1.6;
        ribbonLines.forEach((line, index) => {
          line.update();
          line.draw(ctx, ribbonColors[Math.floor(index / 10) % ribbonColors.length]);
        });
        ctx.globalCompositeOperation = "source-over";
      }
      if (scrollHint) scrollHint.style.opacity = `${Math.max(0, 1 - progress * 5)}`;
      requestAnimationFrame(update);
    };
    update();
  })();
</script>
</body>
