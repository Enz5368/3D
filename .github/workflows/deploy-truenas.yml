name: Tester et deployer OrellanaTech sur TrueNAS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: orellanatech-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Tests et construction
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check code
        run: npm run lint

      - name: Build production site
        run: npm run build

      - name: Upload production files
        uses: actions/upload-artifact@v4
        with:
          name: orellanatech-site
          path: dist/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Mise a jour de orellanatech.monespaceprof.com
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download production files
        uses: actions/download-artifact@v4
        with:
          name: orellanatech-site
          path: dist

      - name: Preparer les fichiers de deploiement
        run: |
          tar -C dist -czf orellanatech-site.tar.gz .
          chmod +x deploy/publish.sh

      - name: Installer cloudflared
        run: |
          curl -fsSL --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Configurer la cle SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config <<EOF
          Host truenas-deploy
              HostName $SSH_HOST
              User $SSH_USER
              IdentityFile ~/.ssh/deploy_key
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new
              ProxyCommand cloudflared access ssh --hostname %h --service-token-id "$CF_ACCESS_CLIENT_ID" --service-token-secret "$CF_ACCESS_CLIENT_SECRET"
          EOF
          chmod 600 ~/.ssh/config

      - name: Envoyer et publier le build
        run: |
          remote_prefix="/tmp/orellanatech-${{ github.sha }}"
          scp orellanatech-site.tar.gz truenas-deploy:"${remote_prefix}.tar.gz"
          scp deploy/nginx-orellanatech.conf truenas-deploy:"${remote_prefix}.conf"
          scp deploy/publish.sh truenas-deploy:"${remote_prefix}.sh"
          ssh truenas-deploy "sh '${remote_prefix}.sh' '${{ github.sha }}' '${remote_prefix}.tar.gz' '${remote_prefix}.conf'"
